spring:
  datasource:
    url: jdbc:h2:mem:transaction_api_test_db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  rabbitmq:
    listener:
      simple:
        auto-startup: false

management:
  health:
    rabbit:
      enabled: false