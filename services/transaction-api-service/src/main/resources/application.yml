spring:
  application:
    name: transaction-api-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://127.0.0.1:5434/fraud_platform}
    username: ${DB_USERNAME:fraud_user}
    password: ${DB_PASSWORD:fraud_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  rabbitmq:
    host: ${RABBITMQ_HOST:127.0.0.1}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:fraud_admin}
    password: ${RABBITMQ_PASSWORD:fraud_admin_pass}

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  health:
    rabbit:
      enabled: true

app:
  messaging:
    exchange: fraud.transaction.exchange
    transaction-created-queue: fraud.transaction.created.queue
    transaction-created-routing-key: transaction.created
    transaction-created-event-type: transaction.created