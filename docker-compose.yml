name: fraud-monitoring-platform

services:
  postgres:
    image: postgres:16
    container_name: fraud-platform-postgres
    hostname: fraud-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fraud_platform}
      POSTGRES_USER: ${POSTGRES_USER:-fraud_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fraud_pass}
    ports:
      - "${POSTGRES_HOST_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fraud_user} -d ${POSTGRES_DB:-fraud_platform}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - fraud-platform-network

  redis:
    image: redis:7
    container_name: fraud-platform-redis
    hostname: fraud-platform-redis
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - fraud-platform-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: fraud-platform-rabbitmq
    hostname: fraud-platform-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-fraud_admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-fraud_admin_pass}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    ports:
      - "${RABBITMQ_HOST_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_HOST_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - fraud-platform-network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  fraud-platform-network:
    driver: bridge