version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: fraud-platform-postgres
    environment:
      POSTGRES_DB: fraud_platform
      POSTGRES_USER: fraud_user
      POSTGRES_PASSWORD: fraud_pass
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: fraud-platform-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: fraud-platform-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"